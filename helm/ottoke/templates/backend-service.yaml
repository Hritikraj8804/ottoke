apiVersion: v1
kind: Service
metadata:
  name: {{ include "ottoke.fullname" . }}-backend
  labels:
    {{- include "ottoke.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
      name: http
  selector:
    app: {{ include "ottoke.fullname" . }}-backend
