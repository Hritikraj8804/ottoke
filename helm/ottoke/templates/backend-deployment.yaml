apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ottoke.fullname" . }}-backend
  labels:
    {{- include "ottoke.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "ottoke.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "ottoke.fullname" . }}-backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ottoke.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ottoke.fullname" . }}-secrets
                  key: REDIS_URL
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ottoke.fullname" . }}-config
                  key: ALLOWED_ORIGINS
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              name: http
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/stats
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/stats
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
