{{- if .Values.databaseSeedJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ottoke.fullname" . }}-db-seed
  labels:
    {{- include "ottoke.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: {{ include "ottoke.fullname" . }}-db-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-seed
          image: "{{ .Values.databaseSeedJob.image.repository }}:{{ .Values.databaseSeedJob.image.tag }}"
          imagePullPolicy: {{ .Values.databaseSeedJob.image.pullPolicy }}
          command: ["python", "scripts/seed_db.py"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ottoke.fullname" . }}-secrets
                  key: DATABASE_URL
{{- end }}
