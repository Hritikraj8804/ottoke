apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ottoke-ingress
  namespace: ottoke
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: ottoke.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ottoke-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ottoke-frontend
                port:
                  number: 8080
