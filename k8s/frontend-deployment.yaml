apiVersion: apps/v1
kind: Deployment
metadata:
  name: ottoke-frontend
  namespace: ottoke
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ottoke-frontend
  template:
    metadata:
      labels:
        app: ottoke-frontend
    spec:
      containers:
        - name: frontend
          image: hritikraj8804/ottoke-frontend:latest
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              cpu: 250m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ottoke-frontend
  namespace: ottoke
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: ottoke-frontend
  type: ClusterIP
